<!DOCTYPE html>

    <style>
        :root {
            --exam-paper: #fdfdfb;
        }
        body { 
            font-family: 'Noto Sans JP', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-exam { 
            font-family: 'Noto Serif JP', serif; 
            letter-spacing: 0.02em;
        }
        .bg-paper { background-color: var(--exam-paper); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }
        .btn-premium {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-premium:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2);
        }
        .loader { 
            border-top-color: #6366f1; 
            animation: spinner 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        @keyframes spinner { to { transform: rotate(360deg); } }
        
        .math-block {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: #1e293b;
            background: #f8fafc;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

    <script>
        // --- Gemini API ---
        const apiKey = ""; 
        const geminiModel = "gemini-2.5-flash-preview-09-2025";
        
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "あなたは日本の難関大学入試の専門講師です。受験生に対して、論理的かつ分かりやすく、親しみやすい言葉で解説を行ってください。重要なポイントは明朝体で強調されることを意識してください。" }] }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) {
                return "解説の取得中にエラーが発生しました。時間を置いて再度お試しください。";
            }
        }

        let activeSection = null;

        const router = {
            home: () => {
                document.getElementById('headerProgress').classList.add('hidden');
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="mb-16 text-center">
                            <h2 class="text-6xl font-black text-slate-900 mb-6 tracking-tight">学びを、<br class="sm:hidden">もっと自由に。</h2>
                            <p class="text-slate-400 text-xl font-medium max-w-2xl mx-auto">全ての過去問を一つの場所に。AI講師の解説で、最短距離の合格へ。</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                            ${Object.entries(EXAM_DATA).map(([key, sub]) => `
                                <div onclick="router.subject('${key}')" class="group p-12 rounded-[2.5rem] bg-white border border-slate-200/60 shadow-sm hover:shadow-2xl hover:border-indigo-400 btn-premium cursor-pointer relative overflow-hidden">
                                    <div class="absolute -right-8 -top-8 w-40 h-40 bg-${sub.color}-50 rounded-full opacity-30 group-hover:scale-125 transition-transform duration-700"></div>
                                    <div class="w-16 h-16 rounded-2xl bg-${sub.color}-50 text-${sub.color}-600 flex items-center justify-center mb-10 relative">
                                        ${sub.icon}
                                    </div>
                                    <h3 class="font-bold text-slate-900 text-2xl relative mb-3">${sub.title}</h3>
                                    <p class="text-slate-400 font-medium leading-relaxed relative">全問題収録済み。AIによる個別解説が可能です。</p>
                                    <div class="mt-10 flex items-center gap-2 text-${sub.color}-600 font-bold group-hover:gap-4 transition-all">
                                        問題を解く <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-width="3"/></svg>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            subject: (key) => {
                const sub = EXAM_DATA[key];
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="fade-in max-w-4xl mx-auto">
                        <button onclick="router.home()" class="flex items-center gap-2 text-slate-400 hover:text-slate-900 mb-12 font-bold transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3"/></svg> 戻る
                        </button>
                        <h2 class="text-4xl font-black text-slate-900 mb-10">${sub.title} 演習セット</h2>
                        <div class="space-y-4">
                            ${sub.sections.map((sec, idx) => `
                                <div onclick="router.session('${key}', ${idx})" class="group p-8 bg-white border border-slate-200/60 rounded-[2rem] flex justify-between items-center hover:border-indigo-400 hover:shadow-xl btn-premium cursor-pointer">
                                    <div class="flex items-center gap-6">
                                        <div class="bg-slate-50 p-4 rounded-2xl group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253" stroke-width="2.5"/></svg>
                                        </div>
                                        <div>
                                            <h4 class="font-bold text-slate-800 text-xl">${sec.title}</h4>
                                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1 inline-block">${sec.questions.length}問</span>
                                        </div>
                                    </div>
                                    <div class="p-3 bg-slate-50 text-slate-300 group-hover:bg-indigo-600 group-hover:text-white rounded-2xl transition-all">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3"/></svg>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            session: (subKey, idx) => {
                activeSection = EXAM_DATA[subKey].sections[idx];
                userAnswers = {};
                document.getElementById('headerProgress').classList.remove('hidden');
                document.getElementById('progressBar').style.width = '0%';
                
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="flex justify-between items-center mb-12">
                            <button onclick="router.subject('${subKey}')" class="text-slate-400 font-bold hover:text-slate-900 transition-colors">
                                ← 中断する
                            </button>
                            <span class="bg-slate-900 text-white px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] shadow-lg">${activeSection.title}</span>
                        </div>
                        
                        <div class="flex flex-col lg:flex-row gap-12">
                            ${activeSection.content ? `
                                <div class="lg:w-1/2">
                                    <div class="bg-paper p-12 rounded-[3rem] border border-slate-200/60 shadow-sm sticky top-32 max-h-[70vh] overflow-y-auto">
                                        <div class="flex justify-between items-center mb-10">
                                            <span class="text-[10px] font-black text-slate-300 tracking-[0.4em] uppercase">Examination Text</span>
                                            <button onclick="explainPassage()" class="flex items-center gap-2 text-[10px] font-black bg-indigo-600 text-white px-5 py-2 rounded-full shadow-lg btn-premium">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="3"/></svg> AI解説
                                            </button>
                                        </div>
                                        <div class="font-exam text-2xl leading-[2.4] text-slate-800 whitespace-pre-wrap">${activeSection.content}</div>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <div class="${activeSection.content ? 'lg:w-1/2' : 'max-w-3xl mx-auto w-full'} space-y-10 pb-32">
                                ${activeSection.questions.map((q, qIdx) => `
                                    <div class="bg-white p-12 rounded-[3rem] border border-slate-200/60 shadow-sm">
                                        <div class="flex justify-between items-start mb-10">
                                            <div class="flex items-start gap-6">
                                                <span class="w-12 h-12 rounded-2xl bg-slate-900 text-white flex items-center justify-center font-black text-xl shadow-xl">Q${qIdx + 1}</span>
                                                <h4 class="text-2xl font-bold leading-snug pt-1">${q.q}</h4>
                                            </div>
                                            <button onclick="explainQuestion(${qIdx})" class="p-3 text-indigo-400 hover:bg-indigo-50 rounded-2xl transition-all" title="AI解説">
                                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2.5"/></svg>
                                            </button>
                                        </div>
                                        ${q.options ? `
                                            <div class="space-y-3">
                                                ${q.options.map((opt, oIdx) => `
                                                    <button onclick="handleSelect(${qIdx}, ${oIdx})" id="q-${qIdx}-opt-${oIdx}" class="w-full text-left p-6 rounded-3xl border-2 border-slate-50 hover:border-indigo-200 bg-slate-50/30 transition-all flex items-center gap-6 group">
                                                        <span class="w-10 h-10 rounded-full border-2 border-slate-200 flex items-center justify-center text-xs font-black text-slate-300 group-hover:border-indigo-400 group-hover:text-indigo-600 transition-colors">${String.fromCharCode(65+oIdx)}</span>
                                                        <span class="font-bold text-slate-700 text-lg">${opt}</span>
                                                    </button>
                                                `).join('')}
                                            </div>
                                        ` : `
                                            <div class="p-10 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-center">
                                                <p class="text-slate-400 font-bold mb-6">ノートに解答を記述してください。</p>
                                                <button onclick="toggleHint(${qIdx})" class="text-xs font-black text-indigo-600 bg-white border border-indigo-100 px-6 py-2.5 rounded-xl shadow-sm btn-premium">解法のヒント</button>
                                                <div id="hint-${qIdx}" class="hidden mt-8 p-8 bg-white border border-indigo-50 text-slate-600 rounded-3xl text-lg text-left leading-relaxed">
                                                    <strong class="text-indigo-900 block mb-2">【Hint】</strong> ${q.hint}
                                                </div>
                                            </div>
                                        `}
                                    </div>
                                `).join('')}
                                
                                ${activeSection.questions[0].options ? `
                                    <button onclick="router.results()" class="w-full py-8 bg-slate-900 text-white font-black text-2xl rounded-[2.5rem] shadow-2xl hover:bg-black active:scale-[0.98] transition-all">
                                        解答を完了する
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            },

            results: () => {
                document.getElementById('headerProgress').classList.add('hidden');
                let score = 0;
                activeSection.questions.forEach((q, idx) => {
                    if (userAnswers[idx] === q.correct) score++;
                });
                const percentage = Math.round((score / activeSection.questions.length) * 100);
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="max-w-2xl mx-auto text-center py-20 fade-in">
                        <div class="relative w-64 h-64 mx-auto mb-16 flex items-center justify-center">
                            <svg class="w-full h-full transform -rotate-90">
                                <circle cx="128" cy="128" r="120" stroke="#f1f5f9" stroke-width="12" fill="transparent"/>
                                <circle cx="128" cy="128" r="120" stroke="#4f46e5" stroke-width="12" fill="transparent" 
                                    stroke-dasharray="754" 
                                    stroke-dashoffset="${754 - (754 * percentage / 100)}"
                                    stroke-linecap="round"
                                    class="transition-all duration-[1.5s] ease-out"
                                />
                            </svg>
                            <div class="absolute flex flex-col">
                                <span class="text-7xl font-black text-slate-900">${percentage}%</span>
                                <span class="text-[10px] font-black text-slate-300 tracking-widest mt-2">SCORE</span>
                            </div>
                        </div>
                        <h2 class="text-5xl font-black text-slate-900 mb-6">${percentage >= 80 ? '素晴らしい到達度です！' : '演習完了！'}</h2>
                        <p class="text-slate-400 text-2xl font-medium mb-16">${activeSection.questions.length}問中 ${score}問 正解しました。</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <button onclick="router.home()" class="py-6 bg-slate-900 text-white font-black text-xl rounded-3xl shadow-xl">トップに戻る</button>
                            <button onclick="location.reload()" class="py-6 bg-white border-2 border-slate-200 font-black text-xl rounded-3xl hover:bg-slate-50 transition-all">もう一度挑戦</button>
                        </div>
                    </div>
                `;
            }
        };

        // --- インタラクション ---
        window.handleSelect = (qIdx, oIdx) => {
            activeSection.questions[qIdx].options.forEach((_, i) => {
                const el = document.getElementById(`q-${qIdx}-opt-${i}`);
                if (el) el.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-800', 'shadow-lg');
            });
            const el = document.getElementById(`q-${qIdx}-opt-${oIdx}`);
            if (el) el.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-800', 'shadow-lg');
            userAnswers[qIdx] = oIdx;

            const answered = Object.keys(userAnswers).length;
            const progress = (answered / activeSection.questions.length) * 100;
            const pb = document.getElementById('progressBar');
            if (pb) pb.style.width = `${progress}%`;
        };

        window.toggleHint = (idx) => {
            document.getElementById(`hint-${idx}`).classList.toggle('hidden');
        };

        window.openAIModal = () => document.getElementById('aiModal').classList.remove('hidden');
        window.closeAIModal = () => document.getElementById('aiModal').classList.add('hidden');

        window.showAILoading = () => {
            document.getElementById('aiContent').innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-16 w-16 mb-8"></div>
                    <p class="text-slate-400 font-bold tracking-widest animate-pulse">AI講師が分析中...</p>
                </div>
            `;
            openAIModal();
        };

        window.explainPassage = async () => {
            showAILoading();
            const response = await callGemini(`この入試問題を分析し、3つの重要なポイントで要約してください：\n\n${activeSection.content}`);
            document.getElementById('aiContent').innerText = response;
        };

        window.explainQuestion = async (idx) => {
            showAILoading();
            const q = activeSection.questions[idx];
            const response = await callGemini(`以下の入試問題の解説を詳しくお願いします：\n\n問題：${q.q}\n正解：${q.options ? q.options[q.correct] : '記述'}\n本文：${activeSection.content || 'なし'}`);
            document.getElementById('aiContent').innerText = response;
        };

        router.home();
    </script>
</body>
</html>
